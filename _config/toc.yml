      - title: Part 3
        children:
          - pattern: '../d/parent_1/part_3/*.md'

  ## Parent 2 
  - title: Parent 2
    children:
      - title: Part 1
        children:
          - pattern: '../d/parent_2/part_1/*.ipynb'
      - title: Part 2
        children:
          - pattern: '../d/parent_2/part_2/*.ipynb'
      - title: Part 3
        children:
          - pattern: '../d/parent_2/part_3/*.ipynb' 

  # =========== E section ================
  ## Parent 1
  - title: Parent 1
    children:
      - title: Part 1
        children:

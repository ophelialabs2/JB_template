# TOC Structure Guide:
# - Use patterns for auto-discovered files: 'directory/*.md'
# - Group related content under parent titles
# - Keep hierarchy 3 levels deep max for usability

version: 1
toc:
  - file: ../c/README.md
  
  # ============= C Section ===============
  # Parent 1 
  - title: Parent 1
    children:
      - title: Part 1
        children:
          - file: '../c/parent_1/part_1/1-1.md'
          - file: '../c/parent_1/part_1/1-2.md'
          - file: '../c/parent_1/part_1/1-3.md'
      - title: Part 2
        children:
          - pattern: '../c/parent_1/part_2/*.ipynb'
      - title: Part 3
        children:
          - pattern: '../c/parent_1/part_3/*.md'
  
  # Parent 2 
  - title: Parent 2
    children:
      - title: Part 1
        children:
          - pattern: '../c/parent_2/part_1/*.ipynb'
      - title: Part 2
        children:
          - pattern: '../c/parent_2/part_2/*.ipynb'
      - title: Part 3
        children:
          - pattern: '../c/parent_2/part_3/*.ipynb'


  # ============== D section ================
  ## Parent 1 
  - title: Parent 1
    children:
      - title: Part 1
        children:
